<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工具追踪 - QQ-Claude-Proxy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="nav">
    <a href="index.html">监控</a>
    <a href="agents.html">Agents</a>
    <a href="skills.html">技能</a>
    <a href="tasks.html">任务</a>
    <a href="context.html">上下文</a>
    <a href="tools.html" class="active">工具</a>
    <a href="config.html">配置</a>
    <a href="logs.html">日志</a>
  </nav>

  <main>
    <h1>🔧 工具调用追踪</h1>

    <section class="stats-grid">
      <div class="stat-card">
        <h3>总调用次数</h3>
        <div class="stat-value" id="totalCalls">-</div>
      </div>
      <div class="stat-card">
        <h3>成功率</h3>
        <div class="stat-value" id="successRate">-</div>
      </div>
      <div class="stat-card">
        <h3>平均延迟</h3>
        <div class="stat-value" id="avgDuration">-</div>
      </div>
      <div class="stat-card">
        <h3>最活跃工具</h3>
        <div class="stat-value" id="topTool">-</div>
      </div>
    </section>

    <section>
      <h2>📊 工具统计</h2>
      <div id="toolStats" class="stats-table">
        <p>加载中...</p>
      </div>
    </section>

    <section>
      <h2>📜 最近调用</h2>
      <div id="recentCalls" class="log-container">
        <p>加载中...</p>
      </div>
    </section>

    <section>
      <h2>🔧 操作</h2>
      <button onclick="refreshData()">刷新数据</button>
      <button onclick="clearLogs()">清空日志</button>
    </section>
  </main>

  <script>
    async function refreshData() {
      try {
        // 获取工具统计
        const statsRes = await fetch('/api/tools/stats');
        const stats = await statsRes.json();

        let totalCalls = 0;
        let totalSuccess = 0;
        let totalDuration = 0;
        let topTool = '-';
        let maxCalls = 0;

        let tableHtml = '<table><tr><th>工具</th><th>调用</th><th>成功</th><th>成功率</th><th>平均延迟</th></tr>';

        for (const stat of stats) {
          totalCalls += stat.totalCalls;
          totalSuccess += stat.successCalls;
          totalDuration += stat.avgDuration * stat.totalCalls;

          if (stat.totalCalls > maxCalls) {
            maxCalls = stat.totalCalls;
            topTool = stat.toolName;
          }

          tableHtml += `
            <tr>
              <td>${stat.toolName}</td>
              <td>${stat.totalCalls}</td>
              <td>${stat.successCalls}/${stat.failureCalls}</td>
              <td>${(stat.successRate * 100).toFixed(1)}%</td>
              <td>${stat.avgDuration.toFixed(0)}ms</td>
            </tr>
          `;
        }

        tableHtml += '</table>';
        document.getElementById('toolStats').innerHTML = tableHtml;

        document.getElementById('totalCalls').textContent = totalCalls;
        document.getElementById('successRate').textContent =
          totalCalls > 0 ? `${(totalSuccess / totalCalls * 100).toFixed(1)}%` : '-';
        document.getElementById('avgDuration').textContent =
          totalCalls > 0 ? `${(totalDuration / totalCalls).toFixed(0)}ms` : '-';
        document.getElementById('topTool').textContent = topTool;

        // 获取最近调用
        const logsRes = await fetch('/api/tools/logs?limit=50');
        const logs = await logsRes.json();

        const container = document.getElementById('recentCalls');
        if (logs.length === 0) {
          container.innerHTML = '<p>(暂无调用记录)</p>';
        } else {
          container.innerHTML = logs.map(log => `
            <div class="log-entry">
              <span class="log-time">${new Date(log.timestamp).toLocaleString()}</span>
              <span class="log-level ${log.result}">${log.result}</span>
              <span class="log-agent">${log.toolName}</span>
              <div class="log-message">${log.duration}ms</div>
              ${log.error ? `<div class="log-error">错误: ${escapeHtml(log.error)}</div>` : ''}
            </div>
          `).join('');
        }
      } catch (error) {
        console.error('刷新失败:', error);
      }
    }

    async function clearLogs() {
      if (!confirm('确定要清空调用日志吗？')) return;

      try {
        await fetch('/api/tools/clear', { method: 'POST' });
        refreshData();
      } catch (error) {
        console.error('清空失败:', error);
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // 自动刷新
    refreshData();
    setInterval(refreshData, 5000);
  </script>
</body>
</html>
