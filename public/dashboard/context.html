<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>上下文监控 - QQ-Claude-Proxy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="nav">
    <a href="index.html">监控</a>
    <a href="agents.html">Agents</a>
    <a href="skills.html">技能</a>
    <a href="tasks.html">任务</a>
    <a href="context.html" class="active">上下文</a>
    <a href="tools.html">工具</a>
    <a href="config.html">配置</a>
    <a href="logs.html">日志</a>
  </nav>

  <main>
    <h1>📊 上下文监控</h1>

    <section class="stats-grid">
      <div class="stat-card">
        <h3>消息数量</h3>
        <div class="stat-value" id="messageCount">-</div>
      </div>
      <div class="stat-card">
        <h3>工作状态</h3>
        <div class="stat-value" id="workStateCount">-</div>
      </div>
      <div class="stat-card">
        <h3>文件引用</h3>
        <div class="stat-value" id="fileRefCount">-</div>
      </div>
      <div class="stat-card">
        <h3>修剪统计</h3>
        <div class="stat-value" id="pruneStats">-</div>
      </div>
    </section>

    <section>
      <h2>📜 消息历史</h2>
      <div id="messageHistory" class="log-container">
        <p>加载中...</p>
      </div>
    </section>

    <section>
      <h2>🔧 操作</h2>
      <button onclick="refreshData()">刷新数据</button>
      <button onclick="clearHistory()">清空历史</button>
      <button onclick="manualPrune()">手动清理</button>
    </section>
  </main>

  <script>
    async function refreshData() {
      try {
        // 获取统计数据
        const statsRes = await fetch('/api/context/stats');
        const stats = await statsRes.json();

        document.getElementById('messageCount').textContent = stats.messageCount || 0;
        document.getElementById('workStateCount').textContent = stats.workStateCount || 0;
        document.getElementById('fileRefCount').textContent = stats.fileReferenceCount || 0;

        // 获取修剪统计
        const pruneRes = await fetch('/api/context/prune-stats');
        const pruneStats = await pruneRes.json();

        document.getElementById('pruneStats').textContent =
          `年龄: ${pruneStats.totalPrunedByAge} | 数量: ${pruneStats.totalPrunedByCount}`;

        // 获取消息历史
        const historyRes = await fetch('/api/context/history');
        const history = await historyRes.json();

        const container = document.getElementById('messageHistory');
        if (history.length === 0) {
          container.innerHTML = '<p>(无消息历史)</p>';
        } else {
          container.innerHTML = history.map(msg => `
            <div class="log-entry">
              <span class="log-time">${new Date(msg.timestamp).toLocaleString()}</span>
              <span class="log-level ${msg.role}">${msg.role}</span>
              ${msg.agentId ? `<span class="log-agent">${msg.agentId}</span>` : ''}
              <div class="log-message">${escapeHtml(msg.content.substring(0, 200))}${msg.content.length > 200 ? '...' : ''}</div>
            </div>
          `).join('');
        }
      } catch (error) {
        console.error('刷新失败:', error);
      }
    }

    async function clearHistory() {
      if (!confirm('确定要清空对话历史吗？')) return;

      try {
        await fetch('/api/context/clear', { method: 'POST' });
        refreshData();
      } catch (error) {
        console.error('清空失败:', error);
      }
    }

    async function manualPrune() {
      try {
        const res = await fetch('/api/context/prune?force=true', { method: 'POST' });
        const data = await res.json();
        alert(`清理完成: 移除 ${data.pruned} 条消息`);
        refreshData();
      } catch (error) {
        console.error('清理失败:', error);
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // 自动刷新
    refreshData();
    setInterval(refreshData, 5000);
  </script>
</body>
</html>
